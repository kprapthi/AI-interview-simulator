<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Interview Simulator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark-theme">
    <div class="glow-bg"></div>
    <div class="glow-bg-secondary"></div>
    <div class="container py-5 min-vh-100 d-flex flex-column justify-content-center align-items-center">
        <!-- Logo Header -->
        <div class="text-center mb-4 animate-fade-in">
            <h2 class="font-outfit fw-extrabold text-gradient-purple-blue mb-1"><i class="bi bi-cpu-fill me-2"></i>AI Interview Simulator</h2>
            <p class="text-muted-custom">Sign in to start practicing mock interviews</p>
        </div>
        <!-- Login Glass Card -->
       <div class="glass-card p-4 p-md-5 w-100 animate-slide-up"
     style="max-width: 550px;">

    <h4 class="font-outfit fw-bold text-white mb-4">
        <i class="bi bi-shield-lock text-purple-accent me-2"></i>
        User Sign In
    </h4>

    <form id="loginForm" onsubmit="handleLogin(event)">

        <!-- Email -->
        <div class="mb-3">
            <label for="email"
                   class="form-label text-muted-custom small fw-semibold">
                Email Address
            </label>

            <div class="input-group">
                <span class="input-group-text bg-dark-glow border-secondary text-white">
                    <i class="bi bi-envelope"></i>
                </span>

                <input
                    type="email"
                    class="form-control bg-dark-glow border-secondary text-white"
                    id="email"
                    required
                    placeholder="name@example.com">
            </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label for="password"
                   class="form-label text-muted-custom small fw-semibold">
                Password
            </label>

            <div class="input-group">
                <span class="input-group-text bg-dark-glow border-secondary text-white">
                    <i class="bi bi-key"></i>
                </span>

                <input
                    type="password"
                    class="form-control bg-dark-glow border-secondary text-white"
                    id="password"
                    required
                    placeholder="••••••••">
            </div>
        </div>

        <!-- Error -->
        <div id="errorAlert"
             class="alert alert-danger d-none py-2 px-3 small border-0 mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="errorMessage">Invalid email or password</span>
        </div>

        <!-- Button -->
        <div class="d-grid mb-3">
            <button type="submit"
                    class="btn btn-purple-action py-3 font-outfit fw-bold"
                    id="loginBtn">

                <span id="btnText">Sign In</span>

                <span class="spinner-border spinner-border-sm ms-2 d-none"
                      id="btnSpinner">
                </span>
            </button>
        </div>

    </form>

    <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
        <span class="text-muted-custom">
            Don't have an account?
            <a href="/register"
               class="text-purple-accent text-decoration-none fw-semibold">
                Sign Up
            </a>
        </span>
    </div>

</div>
            
            <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
                <span class="text-muted-custom small">Don't have an account? <a href="/register" class="text-purple-accent text-decoration-none fw-semibold">Sign Up</a></span>
            </div>
        </div>
    </div>
    <!-- Scripts -->
    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            
            // Set loading state
            loginBtn.disabled = true;
            btnText.textContent = 'Authenticating...';
            btnSpinner.classList.remove('d-none');
            errorAlert.classList.add('d-none');
            
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(data => { throw new Error(data.error || 'Authentication failed') });
                }
                return res.json();
            })
            .then(data => {
                // Redirect on success
                window.location.href = '/';
            })
            .catch(err => {
                console.error(err);
                errorMessage.textContent = err.message;
                errorAlert.classList.remove('d-none');
                
                // Reset states
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In';
                btnSpinner.classList.add('d-none');
            });
        }
    </script>
</body>
</html>
