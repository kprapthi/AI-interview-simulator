<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Interview Simulator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark-theme">
    <div class="glow-bg"></div>
    <div class="glow-bg-secondary"></div>
    <div class="container py-5 min-vh-100 d-flex flex-column justify-content-center align-items-center">
        <!-- Logo Header -->
        <div class="text-center mb-4 animate-fade-in">
            <h2 class="font-outfit fw-extrabold text-gradient-purple-blue mb-1"><i class="bi bi-cpu-fill me-2"></i>AI Interview Simulator</h2>
            <p class="text-muted-custom">Create an account to track your interview progress</p>
        </div>
        <!-- Register Glass Card -->
        <div class="glass-card p-4 p-md-5 w-100 max-width-450 animate-slide-up" style="max-width: 450px;">
            <h4 class="font-outfit fw-bold text-white mb-4"><i class="bi bi-person-plus text-purple-accent me-2"></i>User Sign Up</h4>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label text-muted-custom small fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-glow border-secondary text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control bg-dark-glow border-secondary text-white" id="username" required placeholder="John Doe">
                    </div>
                </div>
                <!-- Email Address -->
                <div class="mb-3">
                    <label for="email" class="form-label text-muted-custom small fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-glow border-secondary text-muted"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control bg-dark-glow border-secondary text-white" id="email" required placeholder="name@example.com">
                    </div>
                </div>
                <!-- Password -->
                <div class="mb-3">
                    <label for="password" class="form-label text-muted-custom small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-glow border-secondary text-muted"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control bg-dark-glow border-secondary text-white" id="password" required placeholder="Min 6 characters">
                    </div>
                </div>
                <!-- Confirm Password -->
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label text-muted-custom small fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-glow border-secondary text-muted"><i class="bi bi-shield-check"></i></span>
                        <input type="password" class="form-control bg-dark-glow border-secondary text-white" id="confirmPassword" required placeholder="••••••••">
                    </div>
                </div>
                <!-- Error Display -->
                <div id="errorAlert" class="alert alert-danger d-none py-2 px-3 small border-0 mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i><span id="errorMessage">Passwords do not match</span>
                </div>
                <!-- Submit Button -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-purple-action py-3 font-outfit fw-bold" id="registerBtn">
                        <span id="btnText">Register Account</span>
                        <span class="spinner-border spinner-border-sm ms-2 d-none" id="btnSpinner" role="status"></span>
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
                <span class="text-muted-custom small">Already have an account? <a href="/login" class="text-purple-accent text-decoration-none fw-semibold">Sign In</a></span>
            </div>
        </div>
    </div>
    <!-- Scripts -->
    <script>
        function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const registerBtn = document.getElementById('registerBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            
            // Password verification
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorAlert.classList.remove('d-none');
                return;
            }
            if (password.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters long';
                errorAlert.classList.remove('d-none');
                return;
            }
            
            // Set loading state
            registerBtn.disabled = true;
            btnText.textContent = 'Creating account...';
            btnSpinner.classList.remove('d-none');
            errorAlert.classList.add('d-none');
            
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(data => { throw new Error(data.error || 'Registration failed') });
                }
                return res.json();
            })
            .then(data => {
                // Redirect on success
                window.location.href = '/login';
            })
            .catch(err => {
                console.error(err);
                errorMessage.textContent = err.message;
                errorAlert.classList.remove('d-none');
                
                // Reset states
                registerBtn.disabled = false;
                btnText.textContent = 'Register Account';
                btnSpinner.classList.add('d-none');
            });
        }
    </script>
</body>
</html>
